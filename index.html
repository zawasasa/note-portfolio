<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ささ｜note Portfolio</title>
  <meta name="description" content="小学校で働くささのnote記事ポートフォリオ。教育ICT・AI活用・自由進度学習・GASなど、現場で実践したことを発信しています。">
  <meta property="og:title" content="ささ｜note Portfolio">
  <meta property="og:description" content="小学校×ICT×AI。現場で実践したことを発信するnote記事まとめ。">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --border-card: rgba(255, 255, 255, 0.08);
      --border-card-hover: rgba(255, 255, 255, 0.15);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-tertiary: #55556a;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --tag-bg: rgba(255, 255, 255, 0.06);
    }

    [data-theme="light"] {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-card: rgba(0, 0, 0, 0.02);
      --bg-card-hover: rgba(0, 0, 0, 0.04);
      --border-card: rgba(0, 0, 0, 0.08);
      --border-card-hover: rgba(0, 0, 0, 0.15);
      --text-primary: #1a1a2e;
      --text-secondary: #666680;
      --text-tertiary: #9999aa;
      --accent: #4f46e5;
      --accent-glow: rgba(79, 70, 229, 0.1);
      --tag-bg: rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ヘッダー */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 500px;
      margin: 0 auto 24px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .social-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 16px;
      border: 1px solid var(--border-card);
      border-radius: 20px;
      transition: all 0.2s;
    }

    .social-links a:hover {
      color: var(--text-primary);
      border-color: var(--border-card-hover);
      background: var(--bg-card);
    }

    /* テーマ切替 */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-card);
      border-radius: 50%;
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
      z-index: 100;
      color: var(--text-primary);
    }

    .theme-toggle:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-card-hover);
    }

    /* 統計 */
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 0 20px 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    /* フィルター */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border: 1px solid var(--border-card);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-card-hover);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: 0.72rem;
      opacity: 0.7;
    }

    /* 検索 */
    .search-wrap {
      max-width: 500px;
      margin: 0 auto 32px;
      padding: 0 20px;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid var(--border-card);
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text-tertiary); }
    .search-input:focus { border-color: var(--accent); }

    /* カードグリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-card-hover);
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    a.card { cursor: pointer; }
    div.card { cursor: default; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .card-category {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }

    .card-tag {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--tag-bg);
      color: var(--text-tertiary);
    }

    .no-link-badge {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      opacity: 0.5;
    }

    /* 件数表示 */
    .result-count {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8rem;
      padding-bottom: 16px;
    }

    /* フッター */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      border-top: 1px solid var(--border-card);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover { color: var(--text-primary); }

    /* レスポンシブ */
    @media (max-width: 768px) {
      .hero { padding: 60px 16px 30px; }
      .stats { gap: 24px; }
      .stat-number { font-size: 1.5rem; }
      .grid {
        grid-template-columns: 1fr;
        padding: 0 12px 60px;
      }
    }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-card);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="テーマ切替">
    <span id="theme-icon">&#9790;</span>
  </button>

  <header class="hero">
    <h1>ささ｜小学校で働く ICT AI活用</h1>
    <p>小学校の教室から、ICTとAIで教育をアップデートする実践記録。note記事のポートフォリオです。</p>
    <div class="social-links">
      <a href="https://note.com/hiroki_sasazawa" target="_blank" rel="noopener">note</a>
      <a href="https://x.com/zawasasa_gas" target="_blank" rel="noopener">X (Twitter)</a>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="search" placeholder="記事を検索...">
  </div>

  <div class="filters" id="filters"></div>

  <p class="result-count" id="result-count"></p>

  <div class="grid" id="grid"></div>

  <footer>
    <p>&copy; 2023-2026 ささ｜小学校で働く ICT AI活用</p>
    <p style="margin-top: 8px;">
      <a href="https://note.com/hiroki_sasazawa" target="_blank" rel="noopener">note.com</a>
    </p>
  </footer>

  <script>
    let articles = [];
    let currentCategory = 'all';
    let searchQuery = '';

    // テーマ
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-icon').innerHTML = next === 'light' ? '&#9728;' : '&#9790;';
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-icon').innerHTML = saved === 'light' ? '&#9728;' : '&#9790;';
    })();

    // データ読み込み
    fetch('articles.json')
      .then(r => r.json())
      .then(data => {
        articles = data;
        renderStats();
        renderFilters();
        renderGrid();
      });

    function renderStats() {
      const el = document.getElementById('stats');
      const years = new Set(articles.map(a => a.date.slice(0, 4)));
      const minYear = Math.min(...[...years].map(Number));
      const maxYear = Math.max(...[...years].map(Number));
      el.innerHTML = `
        <div class="stat">
          <div class="stat-number">${articles.length}</div>
          <div class="stat-label">Articles</div>
        </div>
        <div class="stat">
          <div class="stat-number">${years.size}</div>
          <div class="stat-label">Years</div>
        </div>
        <div class="stat">
          <div class="stat-number">${minYear}–${maxYear}</div>
          <div class="stat-label">Period</div>
        </div>
      `;
    }

    function renderFilters() {
      const el = document.getElementById('filters');
      const cats = {};
      articles.forEach(a => { cats[a.category] = (cats[a.category] || 0) + 1; });

      const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);

      let html = `<button class="filter-btn active" onclick="setFilter('all')">すべて<span class="count">${articles.length}</span></button>`;
      for (const [cat, count] of sorted) {
        html += `<button class="filter-btn" onclick="setFilter('${cat}')">${cat}<span class="count">${count}</span></button>`;
      }
      el.innerHTML = html;
    }

    function setFilter(category) {
      currentCategory = category;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(category === 'all' ? 'すべて' : category));
      });
      renderGrid();
    }

    // 検索
    document.getElementById('search').addEventListener('input', function (e) {
      searchQuery = e.target.value.toLowerCase();
      renderGrid();
    });

    function renderGrid() {
      const el = document.getElementById('grid');
      const filtered = articles.filter(a => {
        if (currentCategory !== 'all' && a.category !== currentCategory) return false;
        if (searchQuery) {
          const haystack = (a.title + ' ' + a.tags.join(' ')).toLowerCase();
          return haystack.includes(searchQuery);
        }
        return true;
      });

      document.getElementById('result-count').textContent = `${filtered.length} 件`;

      el.innerHTML = filtered.map(a => {
        const dateStr = formatDate(a.date);
        const tagsHtml = a.tags.slice(0, 4).map(t => `<span class="card-tag">${t}</span>`).join('');
        const categoryStyle = `background: ${a.categoryColor}22; color: ${a.categoryColor};`;
        const noLinkHtml = a.url ? '' : '<span class="no-link-badge">note URL 未登録</span>';
        const tag = a.url ? 'a' : 'div';
        const href = a.url ? ` href="${a.url}" target="_blank" rel="noopener"` : '';

        return `
          <${tag} class="card"${href}>
            <div class="card-header">
              <span class="card-date">${dateStr}</span>
              <span class="card-category" style="${categoryStyle}">${a.category}</span>
            </div>
            <div class="card-title">${escapeHtml(a.title)}</div>
            <div class="card-tags">${tagsHtml}${noLinkHtml}</div>
          </${tag}>
        `;
      }).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
